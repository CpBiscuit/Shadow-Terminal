function fakeTimestamp(){
  var m=String(Math.floor(Math.random()*60)).padStart('00',2);
  var s=String(Math.floor(Math.random()*60)).padStart('00',2);
  return '03:'+m+':'+s;
}
String.prototype.padStart=String.prototype.padStart||function(len,fill){
  var s=String(this);while(s.length<len)s=(fill||' ')+s;return s;
};

function updateClearance(){
  var lvl=clearancePoints>=10?3:clearancePoints>=5?2:clearancePoints>0?1:0;
  clrDisplay.textContent='LVL '+lvl+' ['+clearancePoints+'pts]';
  clrDisplay.style.color=clearancePoints<=3?'#ff3333':clearancePoints<=6?'#ff6600':'#ffcc00';
}

function appendLine(text,cls){
  var div=document.createElement('div');
  div.className='line'+(cls?' '+cls:'');
  div.textContent=text;
  out.appendChild(div);
  out.scrollTop=out.scrollHeight;
  return div;
}

function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}

function printLines(lines,baseDelay){
  baseDelay=baseDelay||30;
  var i=0;
  function loop(){
    if(i>=lines.length)return Promise.resolve();
    var item=lines[i++];
    var text=item[0],cls=item[1],d=item[2]!==undefined?item[2]:baseDelay;
    return delay(d).then(function(){
      appendLine(text,cls);
      return loop();
    });
  }
  return loop();
}

function logQuery(cmd,risk){
  sessionLog.push({time:fakeTimestamp(),cmd:cmd,risk:risk||'STANDARD'});
}

function scheduleIdleBroadcast(){
  clearTimeout(idleTimer);
  if(councilTakeover)return;
  var t=25000+Math.random()*18000;
  idleTimer=setTimeout(function(){
    if(councilTakeover||busy)return;
    var msg=COUNCIL_BROADCASTS[broadcastIndex%COUNCIL_BROADCASTS.length];
    broadcastIndex++;
    var div=appendLine('[COUNCIL RELAY] ','council');
    var j=0;
    var ti=setInterval(function(){
      if(j>=msg.length){clearInterval(ti);out.scrollTop=out.scrollHeight;scheduleIdleBroadcast();return;}
      div.textContent='[COUNCIL RELAY] '+msg.substring(0,j+1);
      j++;
      out.scrollTop=out.scrollHeight;
    },22);
  },t);
}

function handleCommand(raw){
  if(busy)return Promise.resolve();
  var cmd=raw.trim().toUpperCase();
  if(!cmd)return Promise.resolve();

  clearTimeout(idleTimer);
  busy=true;

  appendLine('SC_RELAY:~$ '+raw.trim(),'dim');

  var p;

  if(cmd==='PURGE'){
    out.innerHTML='';
    busy=false;
    scheduleIdleBroadcast();
    return Promise.resolve();
  }

  if(cmd==='QUERY SYSTEMS ARCHITECT'||cmd==='QUERY ARCHITECT'){
    p=delay(100).then(function(){
      appendLine('[ALIAS RESOLVED → BOB]','dim');
      return delay(300);
    }).then(function(){
      return printLines(LORE['QUERY BOB'](),25);
    });
  } else if(cmd.startsWith('DECRYPT ')){
    var entity=cmd.replace('DECRYPT ','');
    if(clearancePoints<=0){
      p=councilOverride();
    } else {
      clearancePoints=Math.max(0,clearancePoints-3);
      updateClearance();
      logQuery('DECRYPT '+entity,'CRITICAL');
      if(DECRYPT_LORE[entity]){
        p=delay(100).then(function(){
          return printLines([['[CLEARANCE COST: -3pts] Remaining: '+clearancePoints,'warn',0],['','',0]]);
        }).then(function(){
          return printLines(DECRYPT_LORE[entity],25);
        }).then(function(){
          if(clearancePoints<=0){
            return delay(800).then(function(){
              return printLines([['','',0],['WARNING: CLEARANCE DEPLETED. INITIATING PROTOCOL...','red',0],['','',0]]);
            }).then(function(){
              return delay(1200);
            }).then(function(){
              return councilOverride();
            });
          }
        });
      } else {
        p=delay(100).then(function(){
          return printLines([
            ['[CLEARANCE COST: -3pts] Remaining: '+clearancePoints,'warn',0],
            ['','',0],
            ['DECRYPT FAILED: '+entity+' — no sealed data here.','red',0],
            ['The Council does not clarify.','dim',30],
            ['','',0],
          ]);
        });
      }
    }
  } else {
    var aliases={
      'QUERY SC':'QUERY SHADOW COUNCIL',
      'QUERY EW':'QUERY ETERNAL WATCH',
      'QUERY PW':'QUERY PHOENIX WEAPON',
      'QUERY THORNE':'QUERY DR. THORNE',
      'QUERY FURY':'QUERY FURY JOHNSON',
      'QUERY BISCUIT':'QUERY CPT. BISCUIT',
      'QUERY SO':'QUERY SILENT ORDER',
      'QUERY OC':'QUERY OBSIDIAN CIRCLE',
      'QUERY ST':'QUERY SHADOW TRANSMISSION',
      'QUERY TLW':'QUERY THE LIVING WALL',
    };
    var resolved=aliases[cmd]||cmd;

    if(LORE[resolved]){
      p=delay(100).then(function(){return printLines(LORE[resolved](),25);});
    } else if(resolved.startsWith('QUERY ')){
      var ent=resolved.replace('QUERY ','');
      logQuery(resolved,'ELEVATED');
      p=delay(100).then(function(){
        return printLines([
          ['','',0],
          ['QUERY: '+ent,'bright',0],
          ['─────────────────────────────────────','dim',20],
          ['  RESULT: ENTITY NOT INDEXED','red',40],
          ['  Clearance insufficient or outside canon.','dim',30],
          ['  Query flagged.','warn',40],
          ['','',0],
        ],25);
      });
    } else {
      p=delay(100).then(function(){
        return printLines([
          ['','',0],
          ['UNRECOGNIZED COMMAND: '+cmd,'red',0],
          ['Type HELP or use buttons below.','dim',30],
          ['','',0],
        ],25);
      });
    }
  }

  return (p||Promise.resolve()).then(function(){
    out.scrollTop=out.scrollHeight;
    busy=false;
    scheduleIdleBroadcast();
  });
}

function submitInput(){
  if(busy)return;
  var val=inp.value;
  inp.value='';
  handleCommand(val);
}

function runQuick(cmd){
  if(busy)return;
  inp.value='';
  handleCommand(cmd);
}

inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'){submitInput();}
});
