const FAKE_HOUR=3;
function fakeTimestamp(){
  const m=String(Math.floor(Math.random()*60)).padStart(2,'0');
  const s=String(Math.floor(Math.random()*60)).padStart(2,'0');
  return FAKE_HOUR+':'+m+':'+s;
}

function updateClearance(){
  let lvl=clearancePoints>=10?3:clearancePoints>=5?2:clearancePoints>0?1:0;
  clrDisplay.textContent='LVL '+lvl+' ['+clearancePoints+'pts]';
  clrDisplay.style.color=clearancePoints<=3?'#ff3333':clearancePoints<=6?'#ff6600':'#ffcc00';
}

const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function printLines(lines,baseDelay=30){
  for(const[text,cls,d] of lines){
    await delay(d!==undefined?d:baseDelay);
    const div=document.createElement('div');
    div.className='line'+(cls?' '+cls:'');
    div.textContent=text;
    out.appendChild(div);
    out.scrollTop=out.scrollHeight;
  }
}

function logQuery(cmd,risk='STANDARD'){
  sessionLog.push({time:fakeTimestamp(),cmd,risk});
}

let broadcastIndex=0;
function scheduleIdleBroadcast(){
  clearTimeout(idleTimer);
  if(councilTakeover)return;
  const t=25000+Math.random()*18000;
  idleTimer=setTimeout(async()=>{
    if(councilTakeover)return;
    const msg=COUNCIL_BROADCASTS[broadcastIndex%COUNCIL_BROADCASTS.length];
    broadcastIndex++;
    const div=document.createElement('div');
    div.className='line council';
    div.textContent='';
    out.appendChild(div);
    out.scrollTop=out.scrollHeight;
    await delay(300);
    div.textContent='[COUNCIL RELAY] ';
    for(const ch of msg){
      div.textContent+=ch;
      await delay(22);
    }
    out.scrollTop=out.scrollHeight;
    scheduleIdleBroadcast();
  },t);
}

async function handleCommand(raw){
  const cmd=raw.trim().toUpperCase();
  if(!cmd)return;

  clearTimeout(idleTimer);

  const echoDiv=document.createElement('div');
  echoDiv.className='line dim';
  echoDiv.textContent='SC_RELAY:~$ '+raw.trim();
  out.appendChild(echoDiv);
  out.scrollTop=out.scrollHeight;
  await delay(100);

  if(cmd==='PURGE'){out.innerHTML='';scheduleIdleBroadcast();return;}

  if(cmd==='QUERY SYSTEMS ARCHITECT'||cmd==='QUERY ARCHITECT'){
    await printLines([['[ALIAS RESOLVED → BOB]','dim',0]]);
    await delay(300);
    await printLines(LORE['QUERY BOB'](),25);
    scheduleIdleBroadcast();
    return;
  }

  if(cmd.startsWith('DECRYPT ')){
    const entity=cmd.replace('DECRYPT ','');
    if(clearancePoints<=0){await councilOverride();return;}
    clearancePoints=Math.max(0,clearancePoints-3);
    updateClearance();
    logQuery('DECRYPT '+entity,'CRITICAL');
    if(DECRYPT_LORE[entity]){
      await printLines([['[CLEARANCE COST: -3pts] Remaining: '+clearancePoints,'warn',0],['','',0]]);
      await printLines(DECRYPT_LORE[entity],25);
      if(clearancePoints<=0){
        await delay(800);
        await printLines([['','',0],['WARNING: CLEARANCE DEPLETED. INITIATING PROTOCOL...','red',0],['','',0]]);
        await delay(1200);
        await councilOverride();
        return;
      }
    } else {
      await printLines([
        ['[CLEARANCE COST: -3pts] Remaining: '+clearancePoints,'warn',0],
        ['','',0],
        ['DECRYPT FAILED: '+entity+' has no sealed data at this relay node.','red',0],
        ['Or it does not exist. The Council does not clarify.','dim',30],
        ['','',0],
      ]);
    }
    scheduleIdleBroadcast();
    return;
  }

  const aliases={'QUERY SC':'QUERY SHADOW COUNCIL','QUERY EW':'QUERY ETERNAL WATCH','QUERY PW':'QUERY PHOENIX WEAPON','QUERY THORNE':'QUERY DR. THORNE','QUERY FURY':'QUERY FURY JOHNSON','QUERY BISCUIT':'QUERY CPT. BISCUIT'};
  const resolved=aliases[cmd]||cmd;

  if(LORE[resolved]){
    await printLines(LORE[resolved](),25);
  } else if(resolved.startsWith('QUERY ')){
    const entity=resolved.replace('QUERY ','');
    logQuery(resolved,'ELEVATED');
    await printLines([
      ['','',0],
      ['QUERY: '+entity,'bright',0],
      ['─────────────────────────────────────────','dim',20],
      ['  RESULT: ENTITY NOT INDEXED','red',40],
      ['  Clearance insufficient, or entity outside canon.','dim',30],
      ['  This query has been flagged.','warn',40],
      ['','',0],
    ],25);
  } else {
    await printLines([
      ['','',0],
      ['UNRECOGNIZED COMMAND: '+cmd,'red',0],
      ['Type HELP for available commands.','dim',30],
      ['','',0],
    ],25);
  }

  out.scrollTop=out.scrollHeight;
  scheduleIdleBroadcast();
}

inp.addEventListener('keydown',async(e)=>{
  if(e.key==='Enter'){
    const val=inp.value;
    inp.value='';
    inp.disabled=true;
    clearTimeout(idleTimer);
    await handleCommand(val);
    inp.disabled=false;
    inp.focus();
  }
});

  inp.value='';
  if(val.trim())handleCommand(val);
}

});

(function(){

  btns.forEach(function(btn){
