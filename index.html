function updateClearance(){
  var lvl=clearancePoints>=10?3:clearancePoints>=5?2:clearancePoints>0?1:0;

  clrDisplay.style.color=clearancePoints<=3?'#ff3333':clearancePoints<=6?'#ff6600':'#ffcc00';
}

function addLine(text,cls){
  var d=document.createElement('div');
  d.className='line'+(cls?' '+cls:'');
  d.textContent=text;
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
}

function addLines(lines){
  for(var i=0;i<lines.length;i++)addLine(lines[i][0],lines[i][1]);

}

    var hl=[['SESSION AUDIT LOG','bright'],['-------------------------------------','dim']];
    if(sessionLog.length===0){
      hl.push(['No queries logged this session.','dim']);
    } else {
      for(var i=0;i<sessionLog.length;i++){
        var e=sessionLog[i];
        hl.push(['  ['+e.t+'] '+e.cmd+' ['+e.risk+']',e.risk==='CRITICAL'?'red':e.risk==='ELEVATED'?'warn':'dim']);
      }
      hl.push(['','']);
      hl.push(['All entries forwarded to Council archive.','warn']);
    }
    hl.push(['','']);
    addLines(hl);
    return;
  }

  if(resolved.indexOf('DECRYPT ')===0){
    var entity=resolved.replace('DECRYPT ','');
    if(clearancePoints<=0){councilOverride();return;}
    clearancePoints=Math.max(0,clearancePoints-3);
    updateClearance();
    logQ('DECRYPT '+entity,'CRITICAL');
    addLines([['[CLEARANCE COST: -3pts] Remaining: '+clearancePoints,'warn'],['','']]);
    if(DECRYPT[entity]){
      addLines(DECRYPT[entity]);
    } else {
      addLines([
        ['DECRYPT FAILED: '+entity+' -- no sealed data here.','red'],
        ['The Council does not clarify.','dim'],
        ['',''],
      ]);
    }
    if(clearancePoints<=0)councilOverride();
    return;
  }

  if(LORE[resolved]){
    if(resolved.indexOf('QUERY ')===0){
      logQ(resolved,resolved==='QUERY SHADOW COUNCIL'||resolved==='QUERY BOB'?'CRITICAL':'ELEVATED');
    }
    addLines(LORE[resolved]);
    return;
  }

  if(resolved.indexOf('QUERY ')===0){
    logQ(resolved,'ELEVATED');
    addLines([
      ['',''],
      ['QUERY: '+resolved.replace('QUERY ',''),'bright'],
      ['-------------------------------------','dim'],
      ['  RESULT: ENTITY NOT INDEXED','red'],
      ['  Clearance insufficient or outside canon.','dim'],
      ['  Query flagged.','warn'],
      ['',''],
    ]);
    return;
  }

  addLines([
    ['',''],
    ['UNRECOGNIZED COMMAND: '+cmd,'red'],
    ['Type HELP or use the buttons below.','dim'],
    ['',''],
  ]);
}

}

function submitInput(){
  var val=inp.value;inp.value='';handleCommand(val);
}

document.getElementById('send-btn').addEventListener('click',function(e){e.preventDefault();submitInput();});
document.getElementById('send-btn').addEventListener('touchend',function(e){e.preventDefault();submitInput();});
inp.addEventListener('keydown',function(e){if(e.keyCode===13||e.key==='Enter'){e.preventDefault();submitInput();}});

var qbtns=document.querySelectorAll('.qbtn');
for(var bi=0;bi<qbtns.length;bi++){

    var cmd=btn.getAttribute('data-cmd');
    btn.addEventListener('click',function(e){e.preventDefault();handleCommand(cmd);});
    btn.addEventListener('touchend',function(e){e.preventDefault();handleCommand(cmd);});

}
